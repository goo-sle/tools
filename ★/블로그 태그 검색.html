<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higher Ad | 블로그 태그 추출 도구</title>
    <style>
        /* [Higher Ad 브랜드 가이드 기반 스타일링] */
        .tool-container {
            font-family: 'Pretendard', -apple-system, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 24px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .header-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .input-group input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid #eef0f2;
            border-radius: 10px;
            font-size: 15px;
            background: #f8f9fa;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: #03cf5d;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(3, 207, 93, 0.1);
        }

        .btn-extract {
            padding: 14px 28px;
            background: #03cf5d; /* Higher Ad 포인트 컬러 */
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .btn-extract:hover { background: #02b852; }

        /* [결과 카드 레이아웃] */
        #result-container {
            display: none;
            flex-direction: column;
            gap: 14px;
        }

        .result-card {
            padding: 20px;
            border-radius: 12px;
            background-color: #ffffff;
            border: 1px solid #f0f2f5;
            transition: all 0.2s;
        }

        .result-card:hover {
            border-color: #03cf5d;
            box-shadow: 0 4px 12px rgba(3, 207, 93, 0.08);
        }

        .card-top {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .rank-badge {
            font-size: 11px;
            font-weight: 800;
            background: #03cf5d;
            color: #fff;
            padding: 3px 8px;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .blog-link {
            font-size: 13px;
            color: #999;
            text-decoration: none;
            margin-left: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* [태그 구분 스타일: # 개별 노출] */
        .tag-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 12px; /* 태그 사이 간격 */
        }

        .tag-item {
            font-size: 14px;
            color: #0066ff; /* 가독성 높은 파란색 */
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .no-tag { color: #ccc; font-weight: 400; font-size: 13px; }

        .loader {
            display: none;
            text-align: center;
            padding: 30px;
            color: #666;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="tool-container">
    <div class="header-title">🔍 블로그 태그 추출 도구</div>
    
    <div class="input-group">
        <input type="text" id="keyword" placeholder="분석할 키워드를 입력하세요" onkeypress="if(event.keyCode==13) runExtract()">
        <button class="btn-extract" onclick="runExtract()">추출하기</button>
    </div>

    <div id="loader" class="loader">네이버 블로그 데이터를 분석 중입니다...</div>

    <div id="result-container"></div>
</div>

<script>
    async function runExtract() {
        const keyword = document.getElementById('keyword').value;
        const loader = document.getElementById('loader');
        const container = document.getElementById('result-container');
        
        // [사용자님께서 제공하신 최신 GAS URL]
        const API_URL = "https://script.google.com/macros/s/AKfycbzTfy93OBPK6xekDTOyYc8DJIcdbCj9nLUn4RMSe52R1Zsr12lzi7NhJG0-UIymohsddw/exec";

        if (!keyword) { alert("키워드를 입력해 주세요."); return; }

        loader.style.display = "block";
        container.style.display = "none";
        container.innerHTML = "";

        try {
            const response = await fetch(`${API_URL}?keyword=${encodeURIComponent(keyword)}`);
            const result = await response.json();

            if (result.items && result.items.length > 0) {
                result.items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    
                    // 태그 처리: 쉼표를 기준으로 나누고 각각 앞에 #을 붙임
                    let tagHtml = `<span class="no-tag">태그 없음</span>`;
                    if (item.tags && item.tags !== "태그 없음") {
                        // 기존 쉼표 구분자를 제거하고 배열로 변환
                        const tagArray = item.tags.split(',').map(t => t.trim().replace(/^#/, ''));
                        tagHtml = `<div class="tag-wrapper">` + 
                                  tagArray.map(t => `<span class="tag-item">#${t}</span>`).join('') + 
                                  `</div>`;
                    }

                    card.innerHTML = `
                        <div class="card-top">
                            <span class="rank-badge">${item.rank}위</span>
                            <a href="${item.url}" target="_blank" class="blog-link">${item.url}</a>
                        </div>
                        ${tagHtml}
                    `;
                    container.appendChild(card);
                });
                container.style.display = "flex";
            } else {
                alert("결과를 찾을 수 없습니다.");
            }
        } catch (error) {
            console.error(error);
            alert("데이터를 가져오는데 실패했습니다.");
        } finally {
            loader.style.display = "none";
        }
    }
</script>
</body>
</html>
