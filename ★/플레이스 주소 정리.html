<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>네이버 플레이스 URL 정리</title>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <text y='.9em' font-size='90'>🔧</text>
</svg>">

<style>
    body {
        font-family: "Noto Sans KR", sans-serif;
        background: #f5f6f8;
        padding: 50px;
        display: flex;
        justify-content: center;
    }

    .container {
        background: #fff;
        padding: 36px 40px;
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        width: 780px;
    }

    h2 {
        text-align: center;
        margin-bottom: 35px;
        color: #1f2937;
        font-size: 22px;
        font-weight: 700;
    }

    textarea {
        width: 100%;
        height: 210px;
        padding: 14px;
        margin-bottom: 28px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        font-size: 14px;
        resize: vertical;
        box-sizing: border-box;
        scrollbar-gutter: stable;
    }

    button {
        width: 100%;
        padding: 14px;
        background: #2d7df4;
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 40px;
        transition: background 0.2s ease;
    }

    button:hover {
        background: #1e63c9;
    }

    .sub-btn {
        margin-bottom: 0;
        margin-top: 18px;
    }

    .row {
        display: flex;
        gap: 28px;
        margin-top: 18px;
    }

    .col {
        flex: 1;
    }

    h3 {
        margin-top: 40px;
        margin-bottom: 16px;
        font-size: 16px;
        font-weight: 700;
        color: #111827;
    }

    .label {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
        display: block;
        color: #374151;
    }

    .output,
    .error-output {
        white-space: pre-wrap;
        background: #fafafa;
        padding: 16px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        min-height: 140px;
        font-size: 14px;
        line-height: 1.5;
        word-break: break-all;
    }

    .error-output {
        background: #fff5f5;
        border-color: #fca5a5;
        color: #b91c1c;
        margin-top: 10px;
    }
</style>
</head>
<body>

<div class="container">
    <h2>네이버 플레이스 URL 정리</h2>

    <textarea
        id="input"
        placeholder="네이버 플레이스 URL을 여러 줄로 붙여넣으세요"
        oninput="updateButtonCount()"
    ></textarea>

    <button id="extractBtn" onclick="extract()">추출하기</button>

    <h3>URL 결과 / MID 값</h3>

    <div class="row">
        <div class="col">
            <span class="label">URL 결과</span>
            <div id="urlOutput" class="output"></div>
        </div>
        <div class="col">
            <span class="label">MID 값</span>
            <div id="midOutput" class="output"></div>
        </div>
    </div>

    <button class="sub-btn" onclick="copyForExcel()">URL + MID 엑셀 복사</button>

    <h3>비정상 URL</h3>
    <div id="errorOutput" class="error-output"></div>
</div>

<script>
const VALID_URL_REGEX =
    /^https?:\/\/m\.place\.naver\.com\/(restaurant|hospital|place|hairshop|nailshop)\/[0-9]+/;

let cachedPairs = [];

function updateButtonCount() {
    const lines = document.getElementById("input").value.split(/\r?\n/);
    let count = 0;
    lines.forEach(v => {
        if (VALID_URL_REGEX.test(v.trim())) count++;
    });
    document.getElementById("extractBtn").textContent =
        count > 0 ? `${count}개 추출하기` : "추출하기";
}

function extract() {
    const lines = document.getElementById("input").value.split(/\r?\n/);

    let urlList = [];
    let midList = [];
    let wrongList = [];
    cachedPairs = [];

    lines.forEach(line => {
        const v = line.trim();
        if (!v) return;

        const match = v.match(
            /(https?:\/\/m\.place\.naver\.com\/(restaurant|hospital|place|hairshop|nailshop)\/([0-9]+))/
        );

        if (match) {
            urlList.push(match[1]);
            midList.push(match[3]);
            cachedPairs.push([match[1], match[3]]);
        } else {
            wrongList.push(v);
        }
    });

    document.getElementById("urlOutput").textContent = urlList.join("\n");
    document.getElementById("midOutput").textContent = midList.join("\n");
    document.getElementById("errorOutput").textContent = wrongList.join("\n");
}

function copyForExcel() {
    if (cachedPairs.length === 0) {
        alert("복사할 데이터가 없습니다.");
        return;
    }

    const text = cachedPairs
        .map(pair => `${pair[0]}\t${pair[1]}`)
        .join("\n");

    navigator.clipboard.writeText(text)
        .then(() => alert("엑셀용 복사가 완료되었습니다."))
        .catch(() => alert("복사 실패"));
}
</script>

</body>
</html>
