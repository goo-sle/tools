<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>📊 플레이스 URL 추출 도구</title>
    <style>
        :root {
            --primary: #2d7df4;
            --primary-light: #e3f2fd;
            --bg: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --error: #ef4444;
        }

        body {
            font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 26px;
            font-weight: 800;
            color: var(--primary);
            margin: 0;
            letter-spacing: -0.5px;
        }

        /* 메인 카드 스타일 (상단 선 제거) */
        .card {
            background: var(--white);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .section-title {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 15px;
            border: 2px solid #f1f3f5;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            resize: vertical;
            height: 180px;
            background: #f8f9fa;
            transition: all 0.2s;
        }

        textarea:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(45, 125, 244, 0.1);
        }

        /* 버튼 스타일 */
        .btn-main {
            width: 100%;
            height: 54px;
            margin-top: 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 6px rgba(45, 125, 244, 0.2);
        }

        .btn-main:hover {
            background: #1e63c9;
            transform: translateY(-1px);
        }

        /* 결과 그리드 */
        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 0; /* 카드 내부 패딩으로 조절 */
        }

        .output-container {
            display: flex;
            flex-direction: column;
        }

        .output-area {
            height: 220px;
            overflow-y: auto;
            font-family: 'Cascadia Code', 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
            background: #fff;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #34495e;
        }

        .btn-copy-all {
            width: 100%;
            height: 54px;
            background: #ffffff;
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-copy-all:hover {
            background: var(--primary-light);
        }

        .error-card {
            margin-top: 25px;
            border: 1px solid #ffcdd2;
            background: #fff8f8;
            padding: 20px;
            border-radius: 12px;
        }

        .error-output {
            font-size: 12px;
            color: #c62828;
            white-space: pre-wrap;
            max-height: 120px;
            overflow-y: auto;
            margin-top: 10px;
        }

        #info-text {
            text-align: right;
            font-size: 13px;
            color: var(--primary);
            margin-top: 12px;
            font-weight: 700;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #999; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>플레이스 URL 추출 도구</h1>
    </header>

    <div class="card">
        <label class="section-title">📍 플레이스 URL 입력</label>
        <textarea id="input" placeholder="추출할 URL 주소를 줄바꿈(Enter)으로 구분하여 입력하세요." oninput="updateButtonCount()"></textarea>
        <button id="extractBtn" class="btn-main" onclick="extract()">데이터 추출하기</button>
        <div id="info-text"></div>
    </div>

    <div class="card result-grid">
        <div class="output-container">
            <span class="section-title">🔗 추출된 URL 리스트</span>
            <div id="urlOutput" class="output-area"></div>
        </div>
        <div class="output-container">
            <span class="section-title">🔢 MID (플레이스 고유번호)</span>
            <div id="midOutput" class="output-area"></div>
        </div>
    </div>

    <div class="card">
        <button class="btn-copy-all" onclick="copyForExcel()">📋 엑셀 붙여넣기용 복사 (URL + MID)</button>
    </div>

    <div class="error-card">
        <label class="section-title" style="color:var(--error)">⚠️ 형식에 맞지 않는 데이터</label>
        <div id="errorOutput" class="error-output"></div>
    </div>
</div>

<script>
    const VALID_URL_REGEX = /^https?:\/\/m\.place\.naver\.com\/(restaurant|hospital|place|hairshop|nailshop)\/[0-9]+/;
    let cachedPairs = [];

    function updateButtonCount() {
        const lines = document.getElementById("input").value.split(/\r?\n/);
        let count = 0;
        lines.forEach(v => { if (VALID_URL_REGEX.test(v.trim())) count++; });
        document.getElementById("extractBtn").textContent = count > 0 ? `${count}개의 데이터 추출하기` : "데이터 추출하기";
    }

    function extract() {
        const lines = document.getElementById("input").value.split(/\r?\n/);
        let urlList = [];
        let midList = [];
        let wrongList = [];
        cachedPairs = [];

        lines.forEach(line => {
            const v = line.trim();
            if (!v) return;
            const match = v.match(/(https?:\/\/m\.place\.naver\.com\/(restaurant|hospital|place|hairshop|nailshop)\/([0-9]+))/);
            if (match) {
                urlList.push(match[1]);
                midList.push(match[3]);
                cachedPairs.push([match[1], match[3]]);
            } else {
                wrongList.push(v);
            }
        });

        document.getElementById("urlOutput").textContent = urlList.join("\n");
        document.getElementById("midOutput").textContent = midList.join("\n");
        document.getElementById("errorOutput").textContent = wrongList.join("\n");
        document.getElementById("info-text").textContent = urlList.length > 0 ? `✅ 총 ${urlList.length}건 추출 완료` : "";
        
        if(urlList.length > 0) {
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    }

    function copyForExcel() {
        if (cachedPairs.length === 0) {
            alert("먼저 데이터를 추출해주세요.");
            return;
        }
        const text = cachedPairs.map(pair => `${pair[0]}\t${pair[1]}`).join("\n");
        const btn = document.querySelector('.btn-copy-all');
        
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.textContent;
            btn.textContent = "복사 완료! 엑셀에 붙여넣으세요 (Ctrl+V) ✨";
            btn.style.background = "var(--primary)";
            btn.style.color = "#ffffff";
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = "#ffffff";
                btn.style.color = "var(--primary)";
            }, 1500);
        });
    }
</script>

</body>
</html>
