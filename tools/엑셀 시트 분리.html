<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>엑셀 시트 분리 도구</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Arial;
            background: #f5f6f7;
            display: flex;
            justify-content: center;
            padding-top: 80px;
        }
        .container {
            width: 420px;
            background: #fff;
            border-radius: 14px;
            padding: 35px 40px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.08);
        }
        h2 {
            margin: 0 0 20px 0;
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            color: #333;
        }
        .file-box {
            padding: 40px 25px; /* 패딩을 조금 더 늘려 드래그 영역 확보 */
            border: 2px dashed #b9b9b9;
            text-align: center;
            border-radius: 10px;
            background: #fafafa;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }
        /* 드래그 중일 때의 스타일 */
        .file-box.dragover {
            border-color: #3498db;
            background-color: #ebf5fb;
            color: #3498db;
            transform: scale(1.02);
        }
        .file-box:hover {
            border-color: #3498db;
            color: #3498db;
        }
        #excelFile { display: none; }

        #fileNameBox {
            margin-bottom: 20px;
            font-size: 14px;
            color: #333;
            text-align: center;
            min-height: 20px;
            word-break: break-all;
        }

        button {
            width: 100%;
            padding: 14px 0;
            background: #3498db;
            color: #fff;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover {
            background: #2980b9;
        }
        .info {
            font-size: 13px;
            color: #555;
            text-align: center;
            margin-top: 12px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>엑셀 시트 분리 도구</h2>

    <div id="dropZone">
        <label for="excelFile">
            <div class="file-box" id="fileBox">엑셀 파일 업로드 또는 드래그</div>
        </label>
        <input type="file" id="excelFile" accept=".xlsx,.xls" />
    </div>

    <div id="fileNameBox"></div>

    <button onclick="splitSheets()">시트 분리 실행</button>

    <div class="info">
        - 접수 시트 자동 제외<br>
        - 시트별 개별 엑셀 자동 다운로드
    </div>
</div>

<script>
const fileInput = document.getElementById("excelFile");
const fileBox = document.getElementById("fileBox");
const fileNameBox = document.getElementById("fileNameBox");

// 파일 선택 시 이름 표시 로직 (공통)
function updateFileName(file) {
    if (file) {
        fileNameBox.textContent = "선택된 파일: " + file.name;
    } else {
        fileNameBox.textContent = "";
    }
}

// 1. 기존 클릭 업로드 이벤트
fileInput.addEventListener("change", function(){
    updateFileName(this.files[0]);
});

// 2. 드래그 앤 드롭 이벤트 처리
const dropZone = document.getElementById("fileBox");

// 드래그 해서 박스 위로 올라왔을 때
dropZone.addEventListener("dragover", function(e) {
    e.preventDefault();
    this.classList.add("dragover");
});

// 드래그 하다가 박스 밖으로 나갔을 때
dropZone.addEventListener("dragleave", function(e) {
    e.preventDefault();
    this.classList.remove("dragover");
});

// 파일을 놓았을 때 (Drop)
dropZone.addEventListener("drop", function(e) {
    e.preventDefault();
    this.classList.remove("dragover");

    const files = e.dataTransfer.files;
    if (files.length > 0) {
        // input 요소에 파일 할당
        fileInput.files = files;
        updateFileName(files[0]);
    }
});


function splitSheets() {
    const file = fileInput.files[0];

    if (!file) {
        alert("엑셀 파일을 업로드해주세요.");
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e){
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type:'array'});

        const sheetNames = workbook.SheetNames;
        let count = 0;

        sheetNames.forEach(name => {
            if (name.trim() === "접수") return;

            const ws = workbook.Sheets[name];
            const newWB = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(newWB, ws, name);

            const fileName = name + ".xlsx";
            XLSX.writeFile(newWB, fileName);

            count++;
        });

        alert(count + "개 시트가 분리되어 다운로드되었습니다.");
    };

    reader.readAsArrayBuffer(file);
}
</script>

</body>
</html>
